name: Auto post to X

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Post mode'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - random
          - tutorial
          - course
          - addon
      dry_run:
        description: 'Dry run (do not actually post)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 23 * * *'   # 08:00 JST daily (1日1回)

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: node scripts/post-to-x.js ${{ inputs.mode || 'random' }}
